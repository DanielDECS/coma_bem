name: coma_bem
description: "Aplicativo de gestão de experiências gastronômicas ComaBem."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Persistência Local
  sqflite: ^2.4.1
  path: ^1.9.0

  # Ícones e Utilitários de UI
  cupertino_icons: ^1.0.8

  # Hardware e Recursos Nativos
  geolocator: ^13.0.1
  image_picker: ^1.1.2
  geocoding: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
