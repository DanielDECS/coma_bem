name: coma_bem
description: "Aplicativo de gestão de experiências gastronômicas ComaBem."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Persistência Local
  sqflite: ^2.4.1
  path: ^1.9.0

  # Ícones e Utilitários de UI
  cupertino_icons: ^1.0.8

  # Hardware e Recursos Nativos
  geolocator: ^13.0.2
  image_picker: ^1.1.2
  geocoding: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
